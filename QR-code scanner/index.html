<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-Code scanner/reader</title>
    <link rel="stylesheet" href="styles.css">
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
</head>
<body>
<!--QR-Code Scanner/Reader -->
<div class="container">
    <h2>QR-Code Scanner/Reader
        <i class="fa-regular fa-circle-stop" id="stopScan"></i>
    </h2>

    <div class="qrCodeView">
        <input type="file" accept="image/*" id="fileInput" style="display:none"> <!--style= "display:none"-->

        <img id="qrImage"> <!--TEST-->

        <div id="reader"></div>
        <div class="iconGroup">
            <i class="fa-solid fa-upload" onclick="document.getElementById('fileInput').click()"></i>
            <i class="fa-solid fa-camera-retro" onclick="ScanQRImage()"></i>
            <p>Upload of Scan QR Code</p>
        </div>
    </div>

    <div class="qrTextDetails">
        <textarea disabled></textarea>
        <div class="btn">
            <button class="copy">Copy</button>
            <button class="close">Close</button>
        </div>
    </div>
</div>
<script
    type="text/javascript"
    src="https://unpkg.com/html5-qrcode">
</script>
<script src="script.js"></script>
</body>
</html>
